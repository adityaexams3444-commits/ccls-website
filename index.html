<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>CCLS Admin — Login</title>
<link href="https://fonts.googleapis.com/css2?family=DM+Serif+Display:ital@0;1&family=Libre+Franklin:wght@300;400;500;600;700&display=swap" rel="stylesheet">
<style>
  *, *::before, *::after { margin:0; padding:0; box-sizing:border-box; }
  :root {
    --navy: #1A1A2E;
    --navy-mid: #2D2D5E;
    --gold: #C8A951;
    --gold-light: #DFC278;
    --white: #FFFFFF;
    --off-white: #F8F8F4;
    --muted: #6B6B80;
    --border: #E0E0D8;
    --danger: #C0392B;
    --success: #27AE60;
    --shadow: 0 8px 40px rgba(26,26,46,0.12);
  }
  html, body { height:100%; font-family:'Libre Franklin', sans-serif; }
  body {
    background: var(--navy);
    display: flex;
    align-items: center;
    justify-content: center;
    min-height: 100vh;
    position: relative;
    overflow: hidden;
  }
  .bg-pattern {
    position: absolute;
    inset: 0;
    opacity: 0.04;
    background-image:
      repeating-linear-gradient(0deg, transparent, transparent 59px, rgba(200,169,81,0.5) 59px, rgba(200,169,81,0.5) 60px),
      repeating-linear-gradient(90deg, transparent, transparent 59px, rgba(200,169,81,0.5) 59px, rgba(200,169,81,0.5) 60px);
  }
  .bg-glow {
    position: absolute;
    width: 600px;
    height: 600px;
    border-radius: 50%;
    background: radial-gradient(circle, rgba(200,169,81,0.15) 0%, transparent 70%);
    top: 50%;
    left: 50%;
    transform: translate(-50%,-50%);
    pointer-events: none;
  }
  .login-card {
    position: relative;
    z-index: 10;
    background: var(--white);
    width: 420px;
    max-width: calc(100vw - 32px);
    border-radius: 4px;
    overflow: hidden;
    box-shadow: 0 24px 80px rgba(0,0,0,0.4);
    animation: slideUp 0.5s cubic-bezier(0.16,1,0.3,1) both;
  }
  @keyframes slideUp {
    from { opacity:0; transform:translateY(24px); }
    to   { opacity:1; transform:translateY(0); }
  }
  .card-header {
    background: var(--navy);
    padding: 40px 40px 32px;
    text-align: center;
    border-bottom: 3px solid var(--gold);
  }
  .card-header .logo-mark {
    width: 56px;
    height: 56px;
    border: 2px solid var(--gold);
    border-radius: 50%;
    display: flex;
    align-items: center;
    justify-content: center;
    margin: 0 auto 16px;
    font-family: 'DM Serif Display', serif;
    font-size: 1.5rem;
    color: var(--gold);
  }
  .card-header h1 {
    font-family: 'DM Serif Display', serif;
    font-size: 1.4rem;
    color: var(--white);
    font-weight: 400;
    margin-bottom: 4px;
  }
  .card-header p {
    font-size: 0.72rem;
    letter-spacing: 0.12em;
    text-transform: uppercase;
    color: rgba(255,255,255,0.45);
  }
  .card-body { padding: 36px 40px 40px; }
  .form-group { margin-bottom: 20px; }
  .form-group label {
    display: block;
    font-size: 0.72rem;
    font-weight: 600;
    letter-spacing: 0.08em;
    text-transform: uppercase;
    color: var(--navy);
    margin-bottom: 8px;
  }
  .form-group input {
    width: 100%;
    padding: 12px 14px;
    border: 1.5px solid var(--border);
    border-radius: 3px;
    font-family: 'Libre Franklin', sans-serif;
    font-size: 0.92rem;
    color: var(--navy);
    background: var(--off-white);
    transition: all 0.2s;
    outline: none;
  }
  .form-group input:focus {
    border-color: var(--navy);
    background: var(--white);
    box-shadow: 0 0 0 3px rgba(26,26,46,0.06);
  }
  .btn-login {
    width: 100%;
    padding: 14px;
    background: var(--navy);
    color: var(--white);
    border: none;
    border-radius: 3px;
    font-family: 'Libre Franklin', sans-serif;
    font-size: 0.8rem;
    font-weight: 600;
    letter-spacing: 0.1em;
    text-transform: uppercase;
    cursor: pointer;
    transition: all 0.2s;
    margin-top: 8px;
  }
  .btn-login:hover { background: var(--navy-mid); }
  .btn-login:active { transform: scale(0.99); }
  .error-msg {
    background: #FDF3F2;
    border: 1px solid #FADBD8;
    border-left: 3px solid var(--danger);
    padding: 10px 14px;
    font-size: 0.82rem;
    color: var(--danger);
    border-radius: 3px;
    margin-bottom: 16px;
    display: none;
  }
  .error-msg.show { display: block; }
  .footer-note {
    text-align: center;
    font-size: 0.7rem;
    color: var(--muted);
    margin-top: 20px;
    letter-spacing: 0.05em;
  }
  .gold-line {
    width: 40px;
    height: 2px;
    background: var(--gold);
    margin: 0 auto 16px;
  }
</style>
</head>
<body>
<div class="bg-pattern"></div>
<div class="bg-glow"></div>

<div class="login-card">
  <div class="card-header">
    <div class="logo-mark">C</div>
    <div class="gold-line"></div>
    <h1>Admin Portal</h1>
    <p>Corporate &amp; Commercial Law Society</p>
  </div>
  <div class="card-body">
    <div class="error-msg" id="errorMsg">Incorrect username or password. Please try again.</div>
    <form id="loginForm" autocomplete="off">
      <div class="form-group">
        <label for="username">Username</label>
        <input type="text" id="username" placeholder="Enter your username" autocomplete="username">
      </div>
      <div class="form-group">
        <label for="password">Password</label>
        <input type="password" id="password" placeholder="Enter your password" autocomplete="current-password">
      </div>
      <button type="submit" class="btn-login">Sign In to Dashboard</button>
    </form>
    <p class="footer-note">Access restricted to authorised administrators only.</p>
  </div>
</div>

<script>
// Simple credential check — in production this would be server-side.
// Default credentials: admin / ccls2026
const USERS = {
  'admin': 'ccls2026',
  'editor': 'editor2026'
};

document.getElementById('loginForm').addEventListener('submit', function(e) {
  e.preventDefault();
  const u = document.getElementById('username').value.trim();
  const p = document.getElementById('password').value;
  const err = document.getElementById('errorMsg');

  if (USERS[u] && USERS[u] === p) {
    sessionStorage.setItem('ccls_admin_user', u);
    sessionStorage.setItem('ccls_admin_auth', 'true');
    err.classList.remove('show');
    window.location.href = 'dashboard.html';
  } else {
    err.classList.add('show');
    document.getElementById('password').value = '';
  }
});

// Redirect if already logged in
if (sessionStorage.getItem('ccls_admin_auth') === 'true') {
  window.location.href = 'dashboard.html';
}
</script>
</body>
</html>
